<ion-header [class.add-border]="borderLimit" class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Select Company</ion-title>
    <ion-buttons slot="end">
      <ion-button expand="full" (click)="create()">
        Create
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

</ion-header>

<ion-content scrollEvents="true" (ionScroll)="logScrolling($event)">

  <ion-card>
    <ion-card-header>
      <ion-card-title>Filter by</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-grid>
        <ion-row>
          <ion-col size-md="6" size-xs="12" size-lg="3">
            <ion-item>
              <ion-label position="floating" color="primary">Name</ion-label>
              <ion-input type="text" [(ngModel)]="filters.name"></ion-input>
            </ion-item>
          </ion-col>
          <ion-col size-md="6" size-xs="12" size-lg="3">
            <ion-item>
              <ion-label position="floating" color="primary">Common Name - English</ion-label>
              <ion-input type="text" [(ngModel)]="filters.common_name_en"></ion-input>
            </ion-item>
          </ion-col>

          <ion-col size-md="6" size-xs="12" size-lg="3">
            <ion-item>
              <ion-label position="floating" color="primary">Common Name - Arabic</ion-label>
              <ion-input type="text" [(ngModel)]="filters.common_name_ar"></ion-input>
            </ion-item>
          </ion-col>

          <ion-col size-md="6" size-xs="12" size-lg="3">
              <ion-item>
                <ion-label color="primary" position="floating">Filter By</ion-label>
                <ion-select [(ngModel)]="filters.status">
                  <ion-select-option value="4">All</ion-select-option>
                  <ion-select-option value="1">Active</ion-select-option>
                  <ion-select-option value="2">In-Active</ion-select-option>
                  <ion-select-option value="3">active+40 days passed without payment</ion-select-option>
                </ion-select>
              </ion-item>
          </ion-col>

        </ion-row>
      </ion-grid>
    </ion-card-content>

    <ion-card-header>
      <ion-button (click)="loadData(1);">Submit</ion-button>
      <ion-button (click)="resetFilter();" color="secondary">Reset</ion-button>
    </ion-card-header>

  </ion-card>

  <ion-list>
    <section>
      <app-company [company]="company" *ngFor="let company of companies" (click)="rowSelected(company)"></app-company>
    </section>
  </ion-list>

  <loading-modal [loading]="loading || loadingMore" type="text-list"></loading-modal>

  <ion-infinite-scroll *ngIf="currentPage < pageCount" (ionInfinite)="doInfinite($event)">
    <ion-infinite-scroll-content></ion-infinite-scroll-content>
  </ion-infinite-scroll>

</ion-content>
