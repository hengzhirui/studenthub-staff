<ion-popover trigger="date" size="cover" class="date-popup-over" side="top" alignment="center">
  <ng-template>
    <ion-datetime
      (ionChange) = "close($event)"
      presentation="date"
      [min]="min"
      [max]="max"
      [value] = value
      [showDefaultButtons]="true"
    ></ion-datetime>
  </ng-template>
</ion-popover>
