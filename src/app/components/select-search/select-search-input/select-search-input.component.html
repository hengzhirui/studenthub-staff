<ion-item class="input-wrapper" (click)="onClick($event)" tappable [class.no-value-selected]="!value" lines="none">
  <div tabindex="0"></div>
  <ion-label>
    <h5  *ngIf="title">{{title}}</h5>
    <p>{{ selectedItem? selectedItem[labelAttr] : placeholder }}</p>
  </ion-label>
  <ion-icon name="arrow-down-outline" slot="end"></ion-icon>
</ion-item>
